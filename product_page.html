<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>β-NMN | Decode Age — Demo PDP</title>

  <!-- CSS styles -->

  <style>
    /* ============================================ DESIGN TOKENS ========================================= */
    :root {
      --color-bg: #ffffff;
      --color-surface: #f7f8fa;
      --color-border: #e2e4e8;
      --color-text: #1a1d29;
      --color-text-muted: #6b7280;
      --color-brand: #2451b8;
      --color-brand-dark: #1a3a8a;
      --color-success: #1a7a4c;
      --color-success-bg: #e8f5ee;
      --radius: 10px;
      --radius-sm: 6px;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: var(--font);
      color: var(--color-text);
      background: var(--color-surface);
      -webkit-font-smoothing: antialiased;
    }

    .main {

      display: flex;
      flex-direction: column;
    }

    .page-width {
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      background: var(--color-bg);
      position: relative;
    }

    .product-page-block {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px;
      flex-wrap: wrap;
    }

    /* ============================ HEADER ================================ */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--color-border);
    }

    .header__logo {
      font-weight: 800;
      font-size: 18px;
      letter-spacing: 0.5px;
      color: var(--color-brand-dark);
    }

    .cart-button {
      position: relative;
      background: none;
      border: none;
      cursor: pointer;
      padding: 8px;
      font-size: 22px;
      line-height: 1;
    }

    .cart-button__badge {
      position: absolute;
      top: 0;
      right: 0;
      background: var(--color-brand);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      border-radius: 999px;
      min-width: 18px;
      height: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 4px;
    }

    /* =============================== PRODUCT INFO ================================================= */
    .product-media {
      width: 100%;
      max-width: 50%;
    }

    .product-page__content {
      width: 100%;
      max-width: 50%;
    }

    img.product-image__img {
      width: 100%;
      max-width: 100%;
      object-fit: cover;
    }


    .product-info {
      padding: 20px;
    }

    .product-info__badges {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }

    .badge {
      font-size: 11px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid var(--color-brand);
      color: var(--color-brand-dark);
    }

    .badge--filled {
      background: var(--color-brand);
      color: #fff;
      border-color: var(--color-brand);
    }

    .product-info__title {
      font-size: 20px;
      font-weight: 700;
      margin: 0 0 6px;
      color: var(--color-brand-dark);
      line-height: 1.3;
    }

    .product-info__rating {
      font-size: 13px;
      color: var(--color-text-muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* ========================== SIZE SELECTOR ============================== */
    .field-group {
      padding: 0 20px 20px;
    }

    .field-label {
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 10px;
      display: block;
    }

    .size-pills {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .size-pill {
      border: 1.5px solid var(--color-border);
      background: var(--color-bg);
      border-radius: var(--radius-sm);
      padding: 10px 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s ease;
      color: var(--color-text);
    }

    .size-pill:hover {
      border-color: var(--color-brand);
    }

    .size-pill[aria-pressed="true"] {
      border-color: var(--color-brand);
      background: #eef2fb;
      color: var(--color-brand-dark);
    }

    /* =========================== QUANTITY STEPPER ================================ */
    .stepper-row {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .stepper {
      display: inline-flex;
      align-items: center;
      border: 1.5px solid var(--color-border);
      border-radius: 999px;
      overflow: hidden;
    }

    .stepper__btn {
      width: 42px;
      height: 42px;
      border: none;
      background: var(--color-surface);
      font-size: 20px;
      font-weight: 600;
      cursor: pointer;
      color: var(--color-brand-dark);
    }

    .stepper__btn:hover {
      background: #e4e9f3;
    }

    .stepper__btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .stepper__value {
      width: 50px;
      text-align: center;
      font-size: 17px;
      font-weight: 700;
      border: none;
      background: transparent;
    }

    .stepper__value::-webkit-outer-spin-button,
    .stepper__value::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    .stepper-row__unit-price {
      font-size: 13px;
      color: var(--color-text-muted);
    }

    /* ================================= TIER LADDER ===================================== */
    .tier-ladder-label {
      font-size: 13px;
      font-weight: 700;
      margin: 18px 0 10px;
    }

    .tier-ladder {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
    }

    .tier {
      border: 1.5px solid var(--color-border);
      border-radius: var(--radius-sm);
      padding: 10px 4px 8px;
      text-align: center;
      position: relative;
      transition: all 0.2s ease;
    }

    .tier__range {
      font-size: 11px;
      color: var(--color-text-muted);
      font-weight: 600;
      display: block;
      margin-bottom: 3px;
    }

    .tier__pct {
      font-size: 15px;
      font-weight: 800;
      color: var(--color-text);
    }

    .tier--active {
      border-color: var(--color-success);
      background: var(--color-success-bg);
    }

    .tier--active .tier__pct {
      color: var(--color-success);
    }

    .tier__flag {
      position: absolute;
      top: -9px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--color-success);
      color: #fff;
      font-size: 9px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 999px;
      white-space: nowrap;
    }

    /* ================================ PRICE SUMMARY ==================================== */
    .price-summary {
      margin-top: 20px;
      border: 1.5px solid var(--color-success);
      background: var(--color-success-bg);
      border-radius: var(--radius);
      padding: 14px 16px;
    }

    .price-summary__row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      font-size: 14px;
    }

    .price-summary__row+.price-summary__row {
      margin-top: 6px;
    }

    .price-summary__save {
      color: var(--color-success);
      font-weight: 700;
    }

    .price-summary__total-label {
      font-weight: 600;
    }

    .price-summary__total-value {
      font-size: 22px;
      font-weight: 800;
      color: var(--color-text);
    }

    .price-summary__compare {
      font-size: 13px;
      text-decoration: line-through;
      color: var(--color-text-muted);
      margin-right: 6px;
    }

    /* ==================================== ADD TO CART ========================================= */
    .add-to-cart-bar {
      padding: 0 20px 28px;
    }

    .add-to-cart-btn {
      width: 100%;
      background: var(--color-brand);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      padding: 16px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: background 0.15s ease;
    }

    .add-to-cart-btn:hover {
      background: var(--color-brand-dark);
    }

    .add-to-cart-btn:active {
      transform: scale(0.99);
    }

    /* ============================= TOAST =============================== */
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--color-text);
      color: #fff;
      padding: 12px 20px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 600;
      opacity: 0;
      pointer-events: none;
      transition: all 0.25s ease;
      z-index: 200;
      white-space: nowrap;
    }

    .toast--visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ===================== CART DRAWER =============================== */
    .drawer-overlay {
      position: fixed;
      inset: 0;
      background: rgba(15, 18, 30, 0.5);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
      z-index: 100;
    }

    .drawer-overlay--open {
      opacity: 1;
      pointer-events: auto;
    }

    .drawer {
      position: fixed;
      top: 0;
      right: 0;
      width: min(90vw, 400px);
      height: 100%;
      background: #fff;
      transform: translateX(100%);
      transition: transform 0.3s ease;
      z-index: 101;
      display: flex;
      flex-direction: column;
    }

    .drawer--open {
      transform: translateX(0);
    }

    .drawer__header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 20px;
      border-bottom: 1px solid var(--color-border);
    }

    .drawer__title {
      font-size: 17px;
      font-weight: 700;
      margin: 0;
    }

    .drawer__close {
      background: none;
      border: none;
      font-size: 22px;
      cursor: pointer;
      color: var(--color-text-muted);
      padding: 4px;
    }

    .drawer__body {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
    }

    .drawer__empty {
      text-align: center;
      color: var(--color-text-muted);
      font-size: 14px;
      margin-top: 60px;
    }

    .cart-line {
      display: flex;
      gap: 12px;
      padding: 14px 0;
      border-bottom: 1px solid var(--color-border);
    }

    .cart-line__thumb {
      width: 52px;
      height: 64px;
      background: linear-gradient(180deg, #ffffff 0%, #e9ecf3 100%);
      border: 1.5px solid var(--color-border);
      border-radius: 6px;
      flex-shrink: 0;
    }

    .cart-line__info {
      flex: 1;
      min-width: 0;
    }

    .cart-line__name {
      font-size: 13px;
      font-weight: 700;
      margin: 0 0 4px;
    }

    .cart-line__meta {
      font-size: 12px;
      color: var(--color-text-muted);
      margin: 0 0 4px;
    }

    .cart-line__discount-note {
      font-size: 11px;
      font-weight: 700;
      color: var(--color-success);
    }

    .cart-line__price {
      text-align: right;
      flex-shrink: 0;
    }

    .cart-line__price-now {
      font-size: 14px;
      font-weight: 700;
    }

    .cart-line__price-was {
      font-size: 11px;
      text-decoration: line-through;
      color: var(--color-text-muted);
    }

    .cart-line__remove {
      background: none;
      border: none;
      color: var(--color-text-muted);
      font-size: 11px;
      text-decoration: underline;
      cursor: pointer;
      margin-top: 4px;
      padding: 0;
    }

    .drawer__footer {
      border-top: 1px solid var(--color-border);
      padding: 16px 20px 22px;
    }

    .drawer__total-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 4px;
    }

    .drawer__total-row--saved {
      font-size: 13px;
      color: var(--color-success);
      font-weight: 700;
    }

    .drawer__total-row--grand {
      font-size: 18px;
      font-weight: 800;
      margin: 10px 0 14px;
    }

    .checkout-btn {
      width: 100%;
      background: var(--color-text);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      padding: 14px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }

    /* ============================= RESPONSIVE — verified down to 375px ============================= */

    @media (max-width: 768px) {
      .product-page-block {
        flex-direction: column;
        align-items: center;
      }

      .product-media,
      .product-page__content {
        max-width: 100%;
      }
    }

    @media (max-width: 380px) {
      .tier-ladder {
        gap: 4px;
      }

      .tier__range {
        font-size: 10px;
      }

      .tier__pct {
        font-size: 13px;
      }

      .field-group {
        padding: 0 14px 16px;
      }

      .header {
        padding: 14px 14px;
      }

      .add-to-cart-bar {
        padding: 0 14px 24px;
      }
    }
  </style>

</head>

<body>
  <!-- ===================== HEADER ===================== -->
  <header class="header">
    <span class="header__logo">DECODE AGE</span>
    <button class="cart-button" id="cartButton" aria-label="Open cart">
      🛒
      <span class="cart-button__badge" id="cartBadge" hidden>0</span>
    </button>
  </header>

  <main class="main">
    <div class="page-width product-page-block">
      <div class="product-media">
        <!-- ===================== PRODUCT IMAGE ===================== -->
        <div class="product-image">
          <img src="./product_image.webp" alt="product image" class="product-image__img">
        </div>
      </div>
      <div class="product-page__content">
        <!-- ===================== PRODUCT INFO ===================== -->
        <div class="product-info">
          <div class="product-info__badges">
            <span class="badge">CLINICALLY STUDIED</span>
            <span class="badge badge--filled">BESTSELLER</span>
          </div>
          <h1 class="product-info__title">β-NMN | Beta-Nicotinamide Mononucleotide</h1>
          <div class="product-info__rating">⭐⭐⭐⭐⭐ 4.61 &nbsp;·&nbsp; 150 reviews</div>
        </div>
        <div class="field-group">
          <label class="field-label">Size</label>
          <div class="size-pills" id="sizePills" role="group" aria-label="Select size"></div>
        </div>

        <!-- ===================== QUANTITY + TIER LADDER + PRICE ===================== -->
        <div class="field-group">
          <label class="field-label">Quantity</label>
          <div class="stepper-row">
            <div class="stepper">
              <button class="stepper__btn" id="qtyMinus" aria-label="Decrease quantity">−</button>
              <input class="stepper__value" id="qtyInput" type="number" min="1" step="1" value="1" inputmode="numeric">
              <button class="stepper__btn" id="qtyPlus" aria-label="Increase quantity">+</button>
            </div>
            <span class="stepper-row__unit-price" id="unitPriceHint"></span>
          </div>

          <div class="tier-ladder-label">Unlock more savings as you add bottles:</div>
          <div class="tier-ladder" id="tierLadder"></div>

          <div class="price-summary" id="priceSummary">
            <div class="price-summary__row">
              <span id="summaryUnitLine"></span>
              <span class="price-summary__save" id="summarySaveLine"></span>
            </div>
            <div class="price-summary__row">
              <span class="price-summary__total-label">Total</span>
              <span>
                <span class="price-summary__compare" id="summaryCompareAt"></span>
                <span class="price-summary__total-value" id="summaryTotal"></span>
              </span>
            </div>
          </div>
        </div>
        <div class="add-to-cart-bar">
          <button class="add-to-cart-btn" id="addToCartBtn">
            <span>Add to Cart</span>
            <span id="addToCartPrice"></span>
          </button>
        </div>
      </div>
    </div>

  </main>

  <!-- ===================== CART DRAWER ===================== -->
  <div class="drawer-overlay" id="drawerOverlay"></div>
  <aside class="drawer" id="cartDrawer" aria-label="Shopping cart">
    <div class="drawer__header">
      <h2 class="drawer__title">Your Cart</h2>
      <button class="drawer__close" id="drawerClose" aria-label="Close cart">×</button>
    </div>
    <div class="drawer__body" id="drawerBody">
      <p class="drawer__empty">Your cart is empty.</p>
    </div>
    <div class="drawer__footer" id="drawerFooter" hidden>
      <div class="drawer__total-row drawer__total-row--saved">
        <span>Total savings</span>
        <span id="drawerSavedTotal"></span>
      </div>
      <div class="drawer__total-row drawer__total-row--grand">
        <span>Order total</span>
        <span id="drawerGrandTotal"></span>
      </div>
      <button class="checkout-btn" id="checkoutBtn">Checkout</button>
    </div>
  </aside>

  <div class="toast" id="toast"></div>

  <script>
    const PRODUCTS = {
      "250mg": { label: "NMN 250mg", basePrice: 1600, capsulesPerBottle: 30 },
      "500mg": { label: "NMN 500mg", basePrice: 2880, capsulesPerBottle: 30 },
      "1000mg": { label: "NMN 1000mg", basePrice: 5200, capsulesPerBottle: 60 },
    };

    // Quantity-based discount tiers — shared across all sizes.
    // [minQty, maxQty, discountPercent]. maxQty = null means "and above".
    const TIERS = [
      { min: 1, max: 1, pct: 0 },
      { min: 2, max: 3, pct: 10 },
      { min: 4, max: 5, pct: 18 },
      { min: 6, max: null, pct: 25 },
    ];

    /* =================================================================
       PRICING ENGINE
       Pure functions — no DOM access — so this logic is independently
       testable and reusable (e.g. if swapped for a real backend/Function).
       ================================================================= */
    function getTierForQty(qty) {
      return TIERS.find(t => qty >= t.min && (t.max === null || qty <= t.max)) || TIERS[TIERS.length - 1];
    }

    function calculatePricing(sizeKey, qty) {
      const product = PRODUCTS[sizeKey];
      const tier = getTierForQty(qty);
      const perBottle = Math.round(product.basePrice * (1 - tier.pct / 100));
      const total = perBottle * qty;
      const compareAtTotal = product.basePrice * qty;
      const saved = compareAtTotal - total;
      return { product, tier, perBottle, total, compareAtTotal, saved, qty };
    }

    function formatINR(amount) {
      return '₹' + Math.round(amount).toLocaleString('en-IN');
    }

    /* =================================================================
       APPLICATION STATE
       ================================================================= */
    const state = {
      selectedSize: "500mg",
      qty: 1,
      cart: [], // { sizeKey, qty, perBottle, total, saved, compareAtTotal }
    };

    /* =================================================================
       RENDER FUNCTIONS — PDP
       ================================================================= */
    function renderSizePills() {
      const container = document.getElementById('sizePills');
      container.innerHTML = '';
      Object.keys(PRODUCTS).forEach(key => {
        const btn = document.createElement('button');
        btn.className = 'size-pill';
        btn.type = 'button';
        btn.textContent = key;
        btn.setAttribute('aria-pressed', key === state.selectedSize ? 'true' : 'false');
        btn.addEventListener('click', () => {
          state.selectedSize = key;
          renderAll();
        });
        container.appendChild(btn);
      });
    }

    function renderTierLadder(currentQty) {
      const container = document.getElementById('tierLadder');
      container.innerHTML = '';
      TIERS.forEach(tier => {
        const isActive = currentQty >= tier.min && (tier.max === null || currentQty <= tier.max);
        const div = document.createElement('div');
        div.className = 'tier' + (isActive ? ' tier--active' : '');
        const rangeLabel = tier.max === null ? `${tier.min}+` : (tier.min === tier.max ? `${tier.min}` : `${tier.min}-${tier.max}`);
        div.innerHTML = `
      ${isActive ? '<span class="tier__flag">YOU ARE HERE</span>' : ''}
      <span class="tier__range">${rangeLabel}</span>
      <span class="tier__pct">${tier.pct}%</span>
    `;
        container.appendChild(div);
      });
    }

    function renderPriceSummary(pricing) {
      document.getElementById('unitPriceHint').textContent =
        `${formatINR(pricing.perBottle)} / bottle`;

      document.getElementById('summaryUnitLine').textContent =
        `${pricing.qty} ${pricing.qty === 1 ? 'bottle' : 'bottles'} · ${formatINR(pricing.perBottle)}/bottle`;

      document.getElementById('summarySaveLine').textContent =
        pricing.saved > 0 ? `You save ${formatINR(pricing.saved)} (${pricing.tier.pct}% off)` : 'No discount yet';

      document.getElementById('summaryCompareAt').textContent =
        pricing.saved > 0 ? formatINR(pricing.compareAtTotal) : '';

      document.getElementById('summaryTotal').textContent = formatINR(pricing.total);

      document.getElementById('addToCartPrice').textContent = formatINR(pricing.total);

      document.getElementById('bottleLabelSize').textContent = pricing.product.label;
    }

    function renderPDP() {
      const pricing = calculatePricing(state.selectedSize, state.qty);
      document.getElementById('qtyInput').value = state.qty;
      renderTierLadder(state.qty);
      renderPriceSummary(pricing);
      return pricing;
    }

    function renderAll() {
      renderSizePills();
      renderPDP();
    }

    /* =================================================================
       QUANTITY CONTROLS
       ================================================================= */
    function setQty(newQty) {
      state.qty = Math.max(1, parseInt(newQty, 10) || 1);
      renderPDP();
    }

    document.getElementById('qtyMinus').addEventListener('click', () => setQty(state.qty - 1));
    document.getElementById('qtyPlus').addEventListener('click', () => setQty(state.qty + 1));
    document.getElementById('qtyInput').addEventListener('input', (e) => setQty(e.target.value));

    /* =================================================================
       ADD TO CART
       ================================================================= */
    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('toast--visible');
      clearTimeout(showToast._t);
      showToast._t = setTimeout(() => toast.classList.remove('toast--visible'), 1800);
    }

    document.getElementById('addToCartBtn').addEventListener('click', () => {
      const pricing = calculatePricing(state.selectedSize, state.qty);

      // If this size is already in the cart, update it; otherwise add a new line.
      const existing = state.cart.find(line => line.sizeKey === state.selectedSize);
      if (existing) {
        existing.qty = pricing.qty;
        existing.perBottle = pricing.perBottle;
        existing.total = pricing.total;
        existing.saved = pricing.saved;
        existing.compareAtTotal = pricing.compareAtTotal;
        existing.tierPct = pricing.tier.pct;
      } else {
        state.cart.push({
          sizeKey: state.selectedSize,
          qty: pricing.qty,
          perBottle: pricing.perBottle,
          total: pricing.total,
          saved: pricing.saved,
          compareAtTotal: pricing.compareAtTotal,
          tierPct: pricing.tier.pct,
        });
      }

      renderCart();
      showToast(`Added ${pricing.qty} × ${pricing.product.label} to cart`);
    });

    /* =================================================================
       CART DRAWER
       ================================================================= */
    function renderCart() {
      const body = document.getElementById('drawerBody');
      const footer = document.getElementById('drawerFooter');
      const badge = document.getElementById('cartBadge');

      const totalItems = state.cart.reduce((sum, line) => sum + line.qty, 0);
      badge.hidden = totalItems === 0;
      badge.textContent = totalItems;

      if (state.cart.length === 0) {
        body.innerHTML = '<p class="drawer__empty">Your cart is empty.</p>';
        footer.hidden = true;
        return;
      }

      body.innerHTML = '';
      state.cart.forEach((line, index) => {
        const product = PRODUCTS[line.sizeKey];
        const div = document.createElement('div');
        div.className = 'cart-line';
        div.innerHTML = `
      <div class="cart-line__thumb"></div>
      <div class="cart-line__info">
        <p class="cart-line__name">${product.label}</p>
        <p class="cart-line__meta">${line.qty} × ${formatINR(line.perBottle)}/bottle</p>
        ${line.tierPct > 0 ? `<p class="cart-line__discount-note">${line.tierPct}% bundle discount applied</p>` : ''}
        <button class="cart-line__remove" data-remove-index="${index}">Remove</button>
      </div>
      <div class="cart-line__price">
        ${line.saved > 0 ? `<div class="cart-line__price-was">${formatINR(line.compareAtTotal)}</div>` : ''}
        <div class="cart-line__price-now">${formatINR(line.total)}</div>
      </div>
    `;
        body.appendChild(div);
      });

      body.querySelectorAll('[data-remove-index]').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const idx = parseInt(e.target.getAttribute('data-remove-index'), 10);
          state.cart.splice(idx, 1);
          renderCart();
        });
      });

      const grandTotal = state.cart.reduce((sum, line) => sum + line.total, 0);
      const totalSaved = state.cart.reduce((sum, line) => sum + line.saved, 0);

      document.getElementById('drawerSavedTotal').textContent = formatINR(totalSaved);
      document.getElementById('drawerGrandTotal').textContent = formatINR(grandTotal);
      footer.hidden = false;
    }

    function openDrawer() {
      document.getElementById('cartDrawer').classList.add('drawer--open');
      document.getElementById('drawerOverlay').classList.add('drawer-overlay--open');
    }

    function closeDrawer() {
      document.getElementById('cartDrawer').classList.remove('drawer--open');
      document.getElementById('drawerOverlay').classList.remove('drawer-overlay--open');
    }

    document.getElementById('cartButton').addEventListener('click', openDrawer);
    document.getElementById('drawerClose').addEventListener('click', closeDrawer);
    document.getElementById('drawerOverlay').addEventListener('click', closeDrawer);

    document.getElementById('checkoutBtn').addEventListener('click', () => {
      closeDrawer();
      showToast('This is a demo — no real checkout is triggered.');
    });

    /* =================================================================
       INIT
       ================================================================= */
    renderAll();
    renderCart();
  </script>

</body>

</html>
